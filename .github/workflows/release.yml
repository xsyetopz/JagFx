name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish, for example v2.2.2
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  macos:
    name: macOS ${{ matrix.rid }}
    runs-on: macos-14
    env:
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERT_P12_BASE64 != '' &&
        secrets.MACOS_CERT_PASSWORD != '' }}
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERT_P12_BASE64 != '' &&
        secrets.MACOS_CERT_PASSWORD != '' && secrets.MACOS_SIGN_IDENTITY != ''
        && secrets.MACOS_NOTARY_APPLE_ID != '' && secrets.MACOS_NOTARY_TEAM_ID
        != '' && secrets.MACOS_NOTARY_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        rid: [ osx-arm64, osx-x64 ]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag ||
            github.ref }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build + test
        run: |
          dotnet restore
          dotnet build --no-restore --nologo
          dotnet test --no-build --nologo

      - name: Resolve arch label
        run: |
          if [[ "${{ matrix.rid }}" == "osx-arm64" ]]; then
            echo "ARCH_LABEL=arm64" >> "$GITHUB_ENV"
          else
            echo "ARCH_LABEL=x64" >> "$GITHUB_ENV"
          fi

      - name: Publish desktop + cli
        run: |
          make publish-desktop-macos-$ARCH_LABEL
          make publish-cli-macos-$ARCH_LABEL

      - name: Create CLI archive
        run: |
          make release-cli-macos-$ARCH_LABEL

      - name: Import signing cert
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/jagfx-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign app
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          APP_PATH="publish/desktop/${{ matrix.rid }}/JagFx.app"
          codesign --force --deep --options runtime --sign "$MACOS_SIGN_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create DMG
        run: |
          make package-desktop-macos-$ARCH_LABEL

      - name: Sign + notarize DMG
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          VERSION="$(grep -oE '<Version>[^<]+' Directory.Build.props | head -1 | sed 's/<Version>//')"
          APP_PATH="publish/desktop/${{ matrix.rid }}/JagFx.app"
          DMG_PATH="publish/JagFx-${VERSION}-macos-${ARCH_LABEL}.dmg"
          tools/release/sign-notarize-macos.sh "$APP_PATH" "$DMG_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jagfx-macos-${{ matrix.rid }}
          path: |
            publish/*.dmg
            publish/JagFx.Cli-*-macos-*.tar.gz

  windows:
    name: Windows win-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag ||
            github.ref }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build + test
        run: |
          dotnet restore
          dotnet build --no-restore --nologo
          dotnet test --no-build --nologo

      - name: Publish desktop + cli
        run: |
          dotnet publish src/JagFx.Desktop -c Release -r win-x64 -o publish/desktop/win-x64 --nologo --self-contained /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:IncludeAllContentForSelfExtract=true /p:DebugSymbols=false /p:DebugType=None
          dotnet publish src/JagFx.Cli -c Release -r win-x64 -o publish/cli/win-x64 --nologo --self-contained /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:IncludeAllContentForSelfExtract=true /p:DebugSymbols=false /p:DebugType=None

      - name: Build installer + CLI archive
        run: |
          $version = (Select-Xml -Path Directory.Build.props -XPath "/Project/PropertyGroup/Version").Node.InnerText
          ISCC /DAppVersion=$version /DSourceDir="$pwd\publish\desktop\win-x64" /DOutputDir="$pwd\publish" /DIconFile="$pwd\assets\jagfx-icon.ico" packaging/windows/JagFx.iss
          Compress-Archive -Path publish/cli/win-x64/JagFx.Cli.exe -DestinationPath "publish/JagFx.Cli-$version-win-x64.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jagfx-windows-win-x64
          path: |
            publish/*win-x64-setup.exe
            publish/JagFx.Cli-*-win-x64.zip

  linux:
    name: Linux linux-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag ||
            github.ref }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install AppImage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build + test
        run: |
          dotnet restore
          dotnet build --no-restore --nologo
          dotnet test --no-build --nologo

      - name: Publish desktop + cli
        run: |
          make publish-desktop-linux
          make publish-cli-linux

      - name: Build AppImage + CLI archive
        run: |
          make release-desktop-linux
          make release-cli-linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jagfx-linux-x64
          path: |
            publish/*.AppImage
            publish/*linux-x64.tar.gz

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [ macos, windows, linux ]
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name ==
      'workflow_dispatch' && inputs.release_tag != '') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag ||
            github.ref_name }}
        run: |
          mapfile -t ASSETS < <(find release-artifacts -type f | sort)

          if (( ${#ASSETS[@]} == 0 )); then
            echo "no release artifacts found"
            exit 1
          fi

          printf 'release assets:\n'
          printf '  %s\n' "${ASSETS[@]}"

          TITLE="JagFx ${TAG_NAME#v}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${ASSETS[@]}" --clobber
            gh release edit "$TAG_NAME" --title "$TITLE" --latest
          else
            gh release create "$TAG_NAME" "${ASSETS[@]}" \
              --title "$TITLE" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
